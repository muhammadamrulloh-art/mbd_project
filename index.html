<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warung Nusantara</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:800px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

.card{
    border:1px solid #ddd;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

#status{
    padding:10px;
    margin:10px 0;
    background:#f5f5f5;
    border-radius:8px;
}
</style>

</head>
<body>

<h1>Warung Nusantara</h1>

<div id="status">Memuat data...</div>

<h2>Daftar Menu</h2>

<div id="menuList"></div>

<hr>

<h2>Tambah Pesanan</h2>

<form id="orderForm">

<input
type="text"
id="customerId"
placeholder="customer1"
required>

<input
type="number"
id="tableNumber"
placeholder="Nomor Meja"
required>

<button type="submit">
Simpan Pesanan
</button>

</form>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
addDoc,
Timestamp
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB8RfAE6XcxpM9PB8xecL19KOC6aaoNUTc",
  authDomain: "warung-nusantara-3ed35.firebaseapp.com",
  projectId: "warung-nusantara-3ed35",
  storageBucket: "warung-nusantara-3ed35.firebasestorage.app",
  messagingSenderId: "272732432024",
  appId: "1:272732432024:web:501db56158602e502c12ed",
  measurementId: "G-8QEMPK42JR"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadMenu() {

const status = document.getElementById("status");
const menuList = document.getElementById("menuList");

try {

const snapshot = await getDocs(
collection(
db,
"restaurants",
"resto1",
"menus"
)
);

console.log("Jumlah menu:", snapshot.size);

status.innerHTML =
"Jumlah menu ditemukan: " + snapshot.size;

if(snapshot.empty){
menuList.innerHTML =
"<p>Tidak ada menu ditemukan.</p>";
return;
}

snapshot.forEach((doc)=>{

const data = doc.data();

console.log(doc.id,data);

menuList.innerHTML += `
<div class="card">
<h3>${data.name}</h3>
<p>Harga : Rp ${data.price}</p>
<p>Kategori : ${data.category}</p>
<p>Tersedia : ${data.available}</p>
</div>
`;

});

} catch(error){

console.error(error);

status.innerHTML =
"ERROR : " + error.message;

}

}

loadMenu();

document
.getElementById("orderForm")
.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

try{

await addDoc(
collection(db,"orders"),
{
customerId:
document.getElementById("customerId").value,

restaurantId:
"resto1",

tableNumber:
parseInt(
document.getElementById("tableNumber").value
),

status:"pending",

totalPrice:50000,

createdAt:
Timestamp.now()
}
);

alert("Pesanan berhasil disimpan");

}catch(error){

alert(error.message);

}

});

</script>

</body>
</html>
