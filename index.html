<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warung Nusantara</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:1000px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

.card{
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin:10px 0;
    background:#f5f5f5;
}

#status{
    background:#eee;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}
</style>
</head>
<body>

<h1>Warung Nusantara</h1>

<div id="status">
Memuat data...
</div>

<h2>Data Firebase</h2>

<div id="data"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB8RfAE6XcxpM9PB8xecL19KOC6aaoNUTc",
  authDomain: "warung-nusantara-3ed35.firebaseapp.com",
  projectId: "warung-nusantara-3ed35",
  storageBucket: "warung-nusantara-3ed35.firebasestorage.app",
  messagingSenderId: "272732432024",
  appId: "1:272732432024:web:501db56158602e502c12ed",
  measurementId: "G-8QEMPK42JR"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadData(){

const status = document.getElementById("status");
const dataDiv = document.getElementById("data");

try{

console.log("Project :", firebaseConfig.projectId);

const customers = await getDocs(
collection(db,"customers")
);

const orders = await getDocs(
collection(db,"orders")
);

const restaurants = await getDocs(
collection(db,"restaurants")
);

console.log("Customers :", customers.size);
console.log("Orders :", orders.size);
console.log("Restaurants :", restaurants.size);

status.innerHTML = `
<b>Customers :</b> ${customers.size}<br>
<b>Orders :</b> ${orders.size}<br>
<b>Restaurants :</b> ${restaurants.size}
`;

restaurants.forEach((doc)=>{

const data = doc.data();

dataDiv.innerHTML += `
<div class="card">
<h3>${data.name}</h3>
<p>${data.address}</p>
<p>${data.openHours}</p>
<p><b>ID :</b> ${doc.id}</p>
</div>
`;

console.log(doc.id,data);

});

}catch(error){

console.error(error);

status.innerHTML =
"<b>ERROR :</b> " + error.message;

}

}

loadData();

</script>

</body>
</html>
