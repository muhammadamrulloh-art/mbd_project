<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warung Nusantara</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:900px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

.card{
    border:1px solid #ddd;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    background:#f9f9f9;
}

#status{
    background:#eee;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}
</style>

</head>
<body>

<h1>Warung Nusantara</h1>

<div id="status">
Memuat data...
</div>

<h2>Data Restaurant</h2>

<div id="menuList"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB8RfAE6XcxpM9PB8xecL19KOC6aaoNUTc",
  authDomain: "warung-nusantara-3ed35.firebaseapp.com",
  projectId: "warung-nusantara-3ed35",
  storageBucket: "warung-nusantara-3ed35.firebasestorage.app",
  messagingSenderId: "272732432024",
  appId: "1:272732432024:web:501db56158602e502c12ed",
  measurementId: "G-8QEMPK42JR"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadRestaurants(){

const status = document.getElementById("status");
const menuList = document.getElementById("menuList");

try{

const snapshot = await getDocs(
collection(db,"restaurants")
);

console.log("Jumlah Restaurant:", snapshot.size);

status.innerHTML =
"Jumlah Restaurant: " + snapshot.size;

snapshot.forEach((doc)=>{

console.log(doc.id, doc.data());

const data = doc.data();

menuList.innerHTML += `
<div class="card">
<h3>${data.name}</h3>
<p>${data.address}</p>
<p>${data.openHours}</p>
<p>ID : ${doc.id}</p>
</div>
`;

});

}catch(error){

console.error(error);

status.innerHTML =
"ERROR : " + error.message;

}

}

loadRestaurants();

</script>

</body>
</html>
