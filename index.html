<style>
body{

    text-align:center;

<body>

<h1>Warung Nusantara</h1>

<div id="status">
Memuat data...
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB8RfAE6XcxpM9PB8xecL19KOC6aaoNUTc",
  authDomain: "warung-nusantara-3ed35.firebaseapp.com",
  projectId: "warung-nusantara-3ed35",
  storageBucket: "warung-nusantara-3ed35.firebasestorage.app",
  messagingSenderId: "272732432024",
  appId: "1:272732432024:web:501db56158602e502c12ed",
  measurementId: "G-8QEMPK42JR"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadRestaurants(){

const status = document.getElementById("status");

try{

const customers = await getDocs(
collection(db,"customers")
);

const orders = await getDocs(
collection(db,"orders")
);

const restaurants = await getDocs(
collection(db,"restaurants")
);

console.log("Customers:", customers.size);
console.log("Orders:", orders.size);
console.log("Restaurants:", restaurants.size);

status.innerHTML = `
Customers : ${customers.size}<br>
Orders : ${orders.size}<br>
Restaurants : ${restaurants.size}
`;

}catch(error){

console.error(error);

status.innerHTML =
"ERROR : " + error.message;

}

}

loadRestaurants();

</script>
